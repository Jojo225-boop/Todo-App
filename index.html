<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>My ToDo App</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/framework7@6/css/framework7.bundle.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    .page-content {
      padding: 16px;
    }
    .todo-input {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .todo-input input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    .todo-input button {
      padding: 10px 20px;
      background-color: #007aff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .task-list {
      list-style: none;
      padding: 0;
    }
    .task-list li {
      padding: 12px;
      background-color: #f9f9f9;
      margin-bottom: 8px;
      border-radius: 8px;
      border-left: 4px solid #007aff;
    }
    .module-list {
      list-style: none;
      padding: 0;
    }
    .module-list li {
      padding: 10px;
      background-color: #f0f0f0;
      margin-bottom: 6px;
      border-radius: 6px;
    }
    h2 {
      font-size: 24px;
      margin-bottom: 16px;
    }
    h3 {
      font-size: 18px;
      margin: 20px 0 10px 0;
      color: #333;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://cdn.jsdelivr.net/npm/framework7@6/js/framework7.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
